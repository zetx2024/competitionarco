<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Map Widget</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="map.css">
</head>
<body>

    <div class="iarc-map-widget" id="iarc-map-container">
        
        <!-- নতুন স্টুডিও ক্যাপচার বাটন -->
        <button id="capture-btn" class="capture-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
            </svg>
            Play for Capture
        </button>

        <div class="map-marker" id="map-location-marker">
            <svg viewBox="0 0 24 24" fill="#FF2400" width="24px" height="24px">
                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
            </svg>
        </div>

        <div class="map-tooltip" id="map-auto-tooltip"></div>
    </div>

    <script src="map.js"></script>

</body>
</html>
