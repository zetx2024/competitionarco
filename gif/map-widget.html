<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Map Widget</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="map.css">
</head>
<body>

    <!-- রেকর্ডিংয়ের সময় সাময়িক মেসেজ দেখানোর জন্য (এটি রেকর্ডিং ভিডিওতে আসবে না) -->
    <div id="temp-msg" style="position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); color:#FFD700; font-size:24px; font-weight:bold; z-index:9999; display:none; background:rgba(2,16,36,0.9); padding:15px 25px; border-radius:8px; border:1px solid #FFD700;"></div>

    <!-- মেইন ম্যাপ কন্টেইনার -->
    <div class="iarc-map-widget" id="iarc-map-container">
        
        <div class="map-marker" id="map-location-marker">
            <svg viewBox="0 0 24 24" fill="#FF2400" width="24px" height="24px">
                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
            </svg>
        </div>

        <div class="map-tooltip" id="map-auto-tooltip"></div>
    </div>

    <script src="map.js"></script>

</body>
</html>
